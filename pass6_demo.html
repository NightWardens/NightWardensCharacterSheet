<!doctype html><html><head><meta charset="utf-8"><title>Pass 6 Demo</title><style>body{font-family:Georgia,serif;background:#efe8dc;padding:20px}pre{background:#fff;padding:12px;border:1px solid #aaa;white-space:pre-wrap}</style></head><body>
<h1>Night Wardens Auto-GM Pass 6 Demo</h1>
<button id="run">Run Shared/Private Demo</button>
<pre id="out"></pre>
<script src="../src/auto_gm_shared_private_layer.js"></script>
<script>
document.getElementById('run').onclick = () => {
  let state = NWSharedPrivate.createCampaignCase({campaignId:'demo_campaign', title:'Demo Case', createdBy:'riley'});
  state = NWSharedPrivate.logPublic(state,{actor:'Auto-GM',text:'The team enters the abandoned church. The air tastes like old pennies.'}).caseState;
  state = NWSharedPrivate.logPrivate(state,{playerId:'alex',displayName:'Alex',text:'Only Alex sees the black star scratched beneath the altar.',tags:['private-sign']}).caseState;
  state = NWSharedPrivate.addPrivateClue(state,{playerId:'alex',displayName:'Alex',clue:{title:'Black Star Scratch',text:'A nine-circle black star is hidden under old wax below the altar.',source:'altar',tags:['sigil','elder-god']}}).caseState;
  const clueId = state.privateBranches.alex.privateClues[0].id;
  let q = NWSharedPrivate.queueReveal(state,{playerId:'alex',clueId}); state = q.caseState;
  let p = NWSharedPrivate.publishReveal(state,q.reveal.id,{actor:'Alex'}); state = p.caseState;
  document.getElementById('out').textContent = JSON.stringify(NWSharedPrivate.getPartyVisibleState(state), null, 2);
};
</script></body></html>
