<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2a1512" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Night Wardens Digital Field Office</title>
  <style>
    :root{--ink:#241f1b;--blood:#4b0d0d;--blood2:#7b1717;--paper:#efe8dc;--paper2:#fbf4e8;--line:#9d9385;--muted:#695f56;--dark:#29231f;--good:#1f6b3a;--warn:#a16000;--bad:#8d1b1b;--shadow:0 18px 45px rgba(26,18,12,.18)}
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh} button,input,select,textarea{font:inherit} button{cursor:pointer}.hidden{display:none!important}
    body:before{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 17% 9%,rgba(95,78,62,.12) 0 5%,transparent 5.4%),radial-gradient(circle at 68% 18%,rgba(125,65,50,.09) 0 7%,transparent 7.3%),radial-gradient(circle at 82% 88%,rgba(80,70,60,.08) 0 6%,transparent 6.3%),radial-gradient(circle at 35% 78%,rgba(125,65,50,.08) 0 4%,transparent 4.3%),linear-gradient(90deg,transparent 3%,rgba(50,45,40,.13) 3.12%,transparent 3.3%,transparent 96.7%,rgba(50,45,40,.13) 96.9%,transparent 97.1%),linear-gradient(0deg,transparent 3%,rgba(50,45,40,.13) 3.12%,transparent 3.3%,transparent 96.7%,rgba(50,45,40,.13) 96.9%,transparent 97.1%)}
    body:after{content:"✦";position:fixed;left:50%;top:36px;transform:translateX(-50%);font-size:220px;color:rgba(70,64,58,.055);z-index:-1;line-height:1}.wrap{max-width:1280px;margin:auto;padding:18px}.landingWrap{min-height:100vh;display:grid;place-items:center;padding:18px}.hero{border:1px solid rgba(89,74,60,.35);background:rgba(248,242,232,.88);box-shadow:var(--shadow);border-radius:24px;padding:22px;text-align:center;backdrop-filter:blur(8px)}.kicker{font-size:12px;letter-spacing:.35em;text-transform:uppercase;font-weight:900;color:rgba(75,13,13,.85)} h1{margin:2px 0 0;font-size:clamp(34px,5vw,64px);line-height:.95;text-transform:uppercase;letter-spacing:.04em}.sub{margin:.45rem 0 0;color:var(--muted);font-style:italic}
    .grid{display:grid;gap:14px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.dashboardGrid{grid-template-columns:320px 1fr}.mainGrid{grid-template-columns:1.1fr .9fr}.campaignGrid{grid-template-columns:330px 1fr}@media(max-width:900px){.cols2,.cols3,.cols4,.dashboardGrid,.mainGrid,.campaignGrid{grid-template-columns:1fr}.wrap{padding:10px}.hero{padding:16px}}
    .card{border:1px solid rgba(89,74,60,.45);background:rgba(248,242,232,.93);box-shadow:0 12px 30px rgba(26,18,12,.12);border-radius:20px;padding:14px;backdrop-filter:blur(6px)}.card h2{margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(89,74,60,.35);font-size:18px;text-transform:uppercase;letter-spacing:.08em}.card h3{margin:0 0 8px;color:var(--blood);font-size:18px}.small{font-size:12px;color:var(--muted)}.note{background:rgba(75,13,13,.08);border:1px solid rgba(75,13,13,.22);padding:10px;border-radius:14px}.darknote{background:#2d2723;color:#fff;border-radius:14px;padding:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spread{justify-content:space-between}.center{text-align:center}.list{display:grid;gap:8px}.item{border:1px solid rgba(89,74,60,.38);background:rgba(255,255,255,.58);border-radius:14px;padding:10px}.item.active{outline:2px solid var(--blood2);background:rgba(255,255,255,.82)}.menuCard{transition:.15s transform}.menuCard:hover{transform:translateY(-2px)}.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:rgba(75,13,13,.12);border:1px solid rgba(75,13,13,.2);font-size:12px;font-weight:800}.avatar,.portrait{border-radius:18px;border:1px solid var(--line);background:#fff9;width:58px;height:58px;object-fit:cover;display:grid;place-items:center;font-weight:900;color:var(--blood)}.portrait.big{width:112px;height:112px}
    label,.fieldLabel{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:#554a42;margin-bottom:4px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:9px 10px;background:rgba(255,255,255,.72);color:var(--ink)} textarea{min-height:90px;resize:vertical}.btn{border:0;border-radius:13px;padding:10px 13px;font-weight:900;background:var(--blood);color:white}.btn.secondary{background:#3b342f}.btn.ghost{background:rgba(255,255,255,.68);color:var(--ink);border:1px solid var(--line)}.btn.good{background:var(--good)}.btn.warn{background:var(--warn)}.btn.bad{background:var(--bad)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.full{width:100%}
    .topbar{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.profile{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.nav{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{background:#342d28;color:#fff;border:0;border-radius:14px;padding:10px 13px;font-weight:800}.tab.active{background:var(--blood2)}.stepper{display:flex;gap:8px;flex-wrap:wrap}.step{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:#fff8;font-size:12px;font-weight:900}.step.active{background:var(--blood);color:#fff;border-color:var(--blood)}.rank{display:flex;gap:4px}.box{height:20px;width:20px;border:1px solid var(--line);border-radius:4px;background:#fff}.box.on{background:var(--blood);border-color:var(--blood);box-shadow:inset 0 0 0 3px rgba(255,255,255,.3)}.library{max-height:620px;overflow:auto;padding-right:4px}.chatBox{height:430px;overflow:auto;background:rgba(255,255,255,.45);border:1px solid var(--line);border-radius:16px;padding:10px}.msg{border-radius:14px;background:#fff9;margin:8px 0;padding:9px;border:1px solid rgba(89,74,60,.25)}.msg .meta{font-size:11px;color:var(--muted);font-weight:900}.dangerText{color:var(--bad);font-weight:900}.successText{color:var(--good);font-weight:900}.inlineRoll{font-family:ui-monospace,Menlo,Consolas,monospace;background:#fff8;border:1px solid var(--line);padding:3px 7px;border-radius:8px}.divider{height:1px;background:rgba(89,74,60,.3);margin:12px 0}
  </style>
</head>
<body><div id="app"></div>
<script src="firebase-config.js?v=7.0.0"></script>
<script src="app.js?v=7.0.0"></script></body></html>
