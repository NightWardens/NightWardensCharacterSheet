const blank=()=>({schema:2,identity:{name:'',lineage:'',age:'',role:'Tracker',height:'',weight:'',background:'',pronouns:'',concept:'',scar:'',fear:'',safehouse:'',caseName:'',session:'',fileNo:''},portrait:'',attributes:{force:9,prowess:9,intellect:9,instinct:9,will:9,charisma:9,endurance:9},subfocus:{},skills:{},roleTier:1,unlocked:{starter:true,experienced:false,master:false},wardenMarks:0,spentLog:[],health:{healthy:4,wounded:0,critical:0,downed:false},afflictions:'',gear:[],notes:'',move:4,initiative:'Instinct + Awareness',creationStep:0,rollLog:[]});
let C=load();function load(){try{return Object.assign(blank(),JSON.parse(localStorage.getItem(STORE_KEY)||'{}'))}catch(e){return blank()}}function save(){localStorage.setItem(STORE_KEY,JSON.stringify(C))}function set(path,val){let o=C,p=path.split('.');for(let i=0;i<p.length-1;i++){if(!o[p[i]])o[p[i]]={};o=o[p[i]]}o[p.at(-1)]=val;save();render()}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function role(){return DATA.roles[C.identity.role]||DATA.roles.Tracker}function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}function allRoleSkills(r=C.identity.role){let x=DATA.roles[r];return [...x.starter,...x.experienced,...x.master]}function rank(n){return +(C.skills[n]||0)}function canUseSkill(n){let r=role();return r.starter.includes(n)||(C.unlocked.experienced&&r.experienced.includes(n))||(C.unlocked.master&&r.master.includes(n))||rank(n)>0}function spend(cost,label,fn){if(C.wardenMarks<cost){alert('Not enough Warden Marks.');return}C.wardenMarks-=cost;fn&&fn();C.spentLog.unshift({date:new Date().toLocaleString(),cost,label});save();render()}
function tabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${active===t?'active':''}" onclick="active='${t}';render()">${t}</button>`).join('')}
function init(){tabs();render()}
function render(){tabs();let fn={Create,Sheet,LevelUp,Roller,Skills,Grimoire,Armory,Reference}[active.replace(' ','')];document.getElementById('app').innerHTML=fn?fn():Sheet();wire();}
function wire(){document.querySelectorAll('[data-bind]').forEach(el=>{el.oninput=e=>{let v=el.type==='number'?Number(el.value):el.value;let o=C,p=el.dataset.bind.split('.');for(let i=0;i<p.length-1;i++){if(!o[p[i]])o[p[i]]={};o=o[p[i]]}o[p.at(-1)]=v;save()}});document.querySelectorAll('[data-check]').forEach(el=>{el.onchange=e=>set(el.dataset.check,el.checked)});let img=document.getElementById('portraitInput');if(img)img.onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>{C.portrait=rd.result;save();render()};rd.readAsDataURL(f)}}
function panel(title,body){return `<section class="panel"><h2>${title}</h2>${body}</section>`}function field(label,path,type='text'){let v=path.split('.').reduce((o,k)=>o?.[k],C)??'';return `<label class="field">${label}<input data-bind="${path}" type="${type}" value="${esc(v)}"></label>`}function area(label,path){let v=path.split('.').reduce((o,k)=>o?.[k],C)??'';return `<label class="field">${label}<textarea data-bind="${path}">${esc(v)}</textarea></label>`}function sel(label,path,opts){let v=path.split('.').reduce((o,k)=>o?.[k],C)??'';return `<label class="field">${label}<select data-bind="${path}">${opts.map(o=>`<option ${o===v?'selected':''}>${esc(o)}</option>`).join('')}</select></label>`}function ranks(name){let r=rank(name);return `<span class="rank">${[1,2,3].map(i=>`<button class="box ${r>=i?'on':''}" onclick="C.skills['${esc(name)}']=${r===i?i-1:i};save();render()"></button>`).join('')}</span>`}
function applyRole(){let b=blank().attributes;Object.assign(C.attributes,b);Object.entries(role().bonuses).forEach(([k,v])=>C.attributes[k]+=v);role().starter.forEach(s=>C.skills[s]=Math.max(rank(s),1));C.roleTier=1;C.unlocked={starter:true,experienced:false,master:false};save();render()}function nextStep(){C.creationStep=Math.min(4,(C.creationStep||0)+1);save();render()}function prevStep(){C.creationStep=Math.max(0,(C.creationStep||0)-1);save();render()}
function Create(){let st=C.creationStep||0;let steps=['Concept','Identity','Role','Portrait','Finish'];let content='';if(st===0)content=panel('1. Concept',`<div class="notice">Start with one sentence: who they were, what pulled them into the hunt, and how they deal with the supernatural.</div><div class="grid g3">${area('Character Concept','identity.concept')}${area('The scar that taught them the world was wrong','identity.scar')}${area('What do they fear becoming?','identity.fear')}</div>`);if(st===1)content=panel('2. Identity',`<div class="grid g4">${field('Name','identity.name')}${field('Lineage','identity.lineage')}${field('Age','identity.age')}${field('Height','identity.height')}${field('Weight','identity.weight')}${field('Background / Alias','identity.background')}${field('Pronouns / Notes','identity.pronouns')}${field('Safehouse','identity.safehouse')}</div>`);if(st===2)content=panel('3. Choose Role',`<div class="grid g2"><div>${sel('Role','identity.role',Object.keys(DATA.roles))}<p class="notice"><b>${esc(C.identity.role)}</b>: ${esc(role().function)}<br>Backgrounds: ${esc(role().backgrounds)}<br>Flavor: ${esc(role().flavor)}</p><button class="btn" onclick="applyRole()">Apply role bonuses + starter skills</button></div><div>${Object.entries(DATA.roles).map(([n,r])=>`<div class="skillcard"><h3>${n}</h3><div class="muted">${r.function}</div><div>${Object.entries(r.bonuses).map(([k,v])=>`<span class="pill">${cap(k)} +${v}</span>`).join(' ')}</div></div>`).join('')}</div></div>`);if(st===3)content=panel('4. Character Image',`<div class="row"><div class="portrait">${C.portrait?`<img src="${C.portrait}">`:'Upload Image'}</div><div><input id="portraitInput" type="file" accept="image/*"><p class="muted">The image is stored inside the character save JSON as device data. Export your character after adding an image.</p><button class="btn secondary" onclick="C.portrait='';save();render()">Remove image</button></div></div>`);if(st===4)content=panel('5. Finish',`<div class="notice">Your starter package should now be set. You can continue to Sheet, Level Up, Skills, Grimoire, or Armory.</div><div class="grid g2"><button class="btn" onclick="active='Sheet';render()">Open Sheet</button><button class="btn secondary" onclick="downloadCharacter()">Download Character JSON</button></div>`);return `<div class="stepbar">${steps.map((s,i)=>`<span class="step ${i===st?'active':''}">${i+1}. ${s}</span>`).join('')}</div>${content}<div class="row" style="margin-top:12px"><button class="btn secondary" onclick="prevStep()">Back</button><button class="btn" onclick="nextStep()">Next</button></div>`}
function Sheet(){return `<div class="grid g2">${panel('Warden Dossier',`<div class="row"><div class="portrait">${C.portrait?`<img src="${C.portrait}">`:'No Image'}</div><div style="flex:1" class="grid g2">${field('Name','identity.name')}${sel('Role','identity.role',Object.keys(DATA.roles))}${field('Lineage','identity.lineage')}${field('Background / Alias','identity.background')}${field('File No.','identity.fileNo')}${field('Case','identity.caseName')}</div></div><div class="notice"><b>${esc(C.identity.role)}</b> — Tier ${C.roleTier}. Warden Marks: <b>${C.wardenMarks}</b></div><div class="row"><button class="btn secondary" onclick="save()">Save Browser</button><button class="btn secondary" onclick="downloadCharacter()">Download JSON</button><label class="btn secondary">Load JSON<input type="file" accept="application/json" style="display:none" onchange="loadCharacterFile(event)"></label></div>`)}${panel('Attributes',DATA.attributes.map(a=>`<div class="attrline"><b>${DATA.attributeLabels[a]}</b><span class="muted">${attrUse(a)}</span><input type="number" value="${C.attributes[a]||0}" onchange="C.attributes['${a}']=Number(this.value);save();render()"></div>`).join(''))}${panel('Health / State / Afflictions',`<div class="grid g4">${field('Healthy','health.healthy','number')}${field('Wounded','health.wounded','number')}${field('Critical','health.critical','number')}<label class="field">Downed<br><input data-check="health.downed" type="checkbox" ${C.health.downed?'checked':''}></label></div>${area('Afflictions / Corruption / Vessel Strain','afflictions')}`)}${panel('Role Skills / Acquired Skills / Rites',skillList(allKnownSkills(),true))}${panel('Pace & Progression',`<div class="grid g3">${field('Move','move','number')}${field('Initiative','initiative')}${field('Warden Marks','wardenMarks','number')}</div>${area('Notes','notes')}`)}${panel('Gear / Relics',gearList(C.gear))}</div>`}
function attrUse(a){return {force:'damage / grapple / leverage',prowess:'aim / stealth / move',intellect:'research / clues / crafting',instinct:'awareness / tracking / reaction',will:'composure / rituals / vessel checks',charisma:'social pressure / bargains / cover',endurance:'fatigue / recovery / injury resistance'}[a]}
function allKnownSkills(){let roleSkills=allRoleSkills();return [...new Set([...roleSkills,...DATA.sharedSkills.map(s=>s.name),...DATA.spells.map(s=>s.name)])].filter(s=>rank(s)>0||roleSkills.includes(s)).sort()}function skillList(list,locked=false){return `<div class="grid">${list.map(s=>{let roleSkills=allRoleSkills();let lockedText=roleSkills.includes(s)&&!canUseSkill(s)?' locked':'';return `<div class="skillcard"><div class="row" style="justify-content:space-between"><h3>${esc(s)}${lockedText}</h3>${ranks(s)}</div><div class="muted">${skillDesc(s)}</div></div>`}).join('')}</div>`}function skillDesc(s){let sh=DATA.sharedSkills.find(x=>x.name===s),sp=DATA.spells.find(x=>x.name===s);if(sh)return `${sh.attr}: ${sh.use}`;if(sp)return `${sp.kind} — ${sp.roll}; ${sp.effect}`;return role().starter.includes(s)?'Starter role skill':role().experienced.includes(s)?'Experienced role skill':role().master.includes(s)?'Master role skill':'Acquired / custom skill'}
function LevelUp(){let r=role();return `<div class="grid g2">${panel('Guided Level Up',`<div class="notice">Marks: <b>${C.wardenMarks}</b>. Full success = 3, partial = 2, survived failure = 1.</div><div class="row"><button class="btn secondary" onclick="C.wardenMarks+=3;save();render()">+3 Full</button><button class="btn secondary" onclick="C.wardenMarks+=2;save();render()">+2 Partial</button><button class="btn secondary" onclick="C.wardenMarks+=1;save();render()">+1 Failure</button></div><hr><button class="btn" ${C.unlocked.experienced?'disabled':''} onclick="spend(3,'Unlocked Tier 2 / Experienced Skills',()=>{C.unlocked.experienced=true;C.roleTier=Math.max(C.roleTier,2)})">Unlock Tier 2 / Experienced Skills — 3 Marks</button><p></p><button class="btn" ${C.unlocked.master?'disabled':''} onclick="if(confirm('Tier 3 usually needs a narrative milestone. Unlock anyway?'))spend(3,'Unlocked Tier 3 / Master Skills',()=>{C.unlocked.master=true;C.roleTier=3})">Unlock Tier 3 / Master Skills — 3 Marks + Milestone</button><hr><div class="notice"><b>Role-before-shared rule:</b> start with role Starter skills. Tier 2 opens Experienced skills and then off-role/acquired/shared learning. Tier 3 opens Master skills.</div>`)}${panel('Available Role Skills',`<h3>Starter</h3>${levelSkillButtons(r.starter,true)}<h3>Experienced ${C.unlocked.experienced?'':'(locked)'}</h3>${levelSkillButtons(r.experienced,C.unlocked.experienced)}<h3>Master ${C.unlocked.master?'':'(locked)'}</h3>${levelSkillButtons(r.master,C.unlocked.master)}`)}${panel('Shared / Acquired Skills',`<div class="notice">Acquired skills unlock after Tier 2. Default cost: 2 Marks to learn at Rank 1. Rank ups cost 1 Mark.</div>${levelSkillButtons(DATA.sharedSkills.map(s=>s.name),C.unlocked.experienced,true)}`)}${panel('Attribute Growth',DATA.attributes.map(a=>`<div class="skillcard"><div class="row" style="justify-content:space-between"><b>${DATA.attributeLabels[a]}: ${C.attributes[a]}</b><button class="btn small" onclick="spend(${C.attributes[a]>=12?6:4},'Raised ${DATA.attributeLabels[a]}',()=>C.attributes['${a}']++)">+1 (${C.attributes[a]>=12?6:4} Marks)</button></div></div>`).join(''))}${panel('Spend Log',C.spentLog.map(x=>`<div class="muted">${x.date}: -${x.cost} ${x.label}</div>`).join('')||'<p class="muted">No spending yet.</p>')}</div>`}
function levelSkillButtons(list,enabled,shared=false){return `<div class="grid">${list.map(s=>`<div class="skillcard"><div class="row" style="justify-content:space-between"><span><b>${s}</b><br><span class="muted">Rank ${rank(s)} — ${skillDesc(s)}</span></span><span class="row">${ranks(s)}<button class="btn small" ${!enabled||rank(s)>=3?'disabled':''} onclick="spend(${rank(s)>0?1:(shared?2:1)},'${rank(s)>0?'Ranked up':'Learned'} ${esc(s)}',()=>C.skills['${esc(s)}']=(C.skills['${esc(s)}']||0)+1)">${rank(s)>0?'Rank +1':'Learn'}</button></span></div></div>`).join('')}</div>`}
function Roller(){let options=[...new Set([...Object.keys(C.skills),...DATA.sharedSkills.map(s=>s.name),...DATA.spells.map(s=>s.name)])].sort();return `${panel('Roll Builder',`<div class="grid g3"><label class="field">Dice<select id="diceMode"><option>3d6</option><option>2d6</option></select></label><label class="field">Attribute<select id="rollAttr">${DATA.attributes.map(a=>`<option value="${a}">${DATA.attributeLabels[a]} (${C.attributes[a]})</option>`).join('')}</select></label><label class="field">Primary Skill<select id="rollSkill">${options.map(s=>`<option>${s}</option>`).join('')}</select></label><label class="field">Support 1<select id="sup1"><option>None</option>${options.map(s=>`<option>${s}</option>`).join('')}</select></label><label class="field">Support 2<select id="sup2"><option>None</option>${options.map(s=>`<option>${s}</option>`).join('')}</select></label><label class="field">Setbacks<input id="setbacks" type="number" value="0"></label></div><button class="btn" onclick="doRoll()">Roll Check</button>`)}${panel('Roll Log',(C.rollLog||[]).map(x=>`<div class="log ${x.success?'success':'fail'}"><b>${x.success?'SUCCESS':'FAILURE'}</b> ${x.label}: ${x.dice.join('+')} = <b>${x.total}</b> vs ${x.target}<br><span class="muted">${x.detail}</span></div>`).join('')||'<p class="muted">No rolls yet.</p>')}`}
function doRoll(){let mode=document.getElementById('diceMode').value,count=mode==='2d6'?2:3,dice=Array.from({length:count},()=>Math.ceil(Math.random()*6)),total=dice.reduce((a,b)=>a+b,0),a=document.getElementById('rollAttr').value,sk=document.getElementById('rollSkill').value,s1=document.getElementById('sup1').value,s2=document.getElementById('sup2').value,setb=Number(document.getElementById('setbacks').value||0),off=(rank(s1)>0?1:0)+(rank(s2)>0?1:0);off=Math.min(2,off);let target=(C.attributes[a]||0)+rank(sk)-Math.max(0,setb-off);C.rollLog=C.rollLog||[];C.rollLog.unshift({success:total<=target,label:`${DATA.attributeLabels[a]} + ${sk}`,dice,total,target,detail:`${mode}; attr ${C.attributes[a]} + skill ${rank(sk)} - setbacks ${setb} + support offset ${off}`});C.rollLog=C.rollLog.slice(0,20);save();render()}
function Skills(){let q=(window.lastSkillSearch||'');let all=[...new Set([...Object.values(DATA.roles).flatMap(r=>[...r.starter,...r.experienced,...r.master]),...DATA.sharedSkills.map(s=>s.name)])].sort().filter(s=>s.toLowerCase().includes(q.toLowerCase()));return panel('Skill Library',`<input placeholder="Search skills" value="${esc(q)}" oninput="window.lastSkillSearch=this.value;render()"><div class="library grid g3">${all.map(s=>`<div class="skillcard"><h3>${s}</h3><div class="muted">${skillDesc(s)}</div>${ranks(s)}</div>`).join('')}</div>`)}
function Grimoire(){let q=(window.lastSpellSearch||''),kind=(window.spellKind||'All');let arr=DATA.spells.filter(s=>(kind==='All'||s.kind===kind)&&s.name.toLowerCase().includes(q.toLowerCase()));let kinds=['All',...new Set(DATA.spells.map(s=>s.kind))];return panel('Grimoire / Spells / Rites',`<div class="grid g2"><input placeholder="Search spells" value="${esc(q)}" oninput="window.lastSpellSearch=this.value;render()"><select onchange="window.spellKind=this.value;render()">${kinds.map(k=>`<option ${k===kind?'selected':''}>${k}</option>`).join('')}</select></div><div class="library grid g2">${arr.map(s=>`<div class="skillcard"><h3>${s.name}</h3><span class="pill red">${s.kind}</span> <span class="pill">${s.school}</span><p><b>Roll:</b> ${s.roll}</p><p><b>Cost:</b> ${s.cost}</p><p><b>Effect:</b> ${s.effect}</p><p class="muted"><b>Backlash:</b> ${s.backlash}</p>${ranks(s.name)}</div>`).join('')}</div>`)}
function Armory(){let q=(window.lastGearSearch||''),cat=(window.gearCat||'All');let cats=['All',...new Set(DATA.gear.map(g=>g.category))];let arr=DATA.gear.filter(g=>(cat==='All'||g.category===cat)&&JSON.stringify(g).toLowerCase().includes(q.toLowerCase()));return panel('Items / Gear / Relics / Materials',`<div class="grid g2"><input placeholder="Search armory" value="${esc(q)}" oninput="window.lastGearSearch=this.value;render()"><select onchange="window.gearCat=this.value;render()">${cats.map(c=>`<option ${c===cat?'selected':''}>${c}</option>`).join('')}</select></div><div class="library grid g3">${arr.map(g=>`<div class="itemcard"><h3>${g.name}</h3><span class="pill red">${g.category}</span> <span class="pill">${g.type}</span><p>${g.effect}</p><p class="muted">${g.notes}</p><button class="btn small" onclick="addGear('${esc(g.name)}')">Add to Character</button></div>`).join('')}</div>`)}function addGear(n){if(!C.gear.includes(n))C.gear.push(n);save();render()}function gearList(list){return `<div class="grid">${(list||[]).map(n=>{let g=DATA.gear.find(x=>x.name===n);return `<div class="itemcard"><div class="row" style="justify-content:space-between"><b>${n}</b><button class="btn small secondary" onclick="C.gear=C.gear.filter(x=>x!=='${esc(n)}');save();render()">Remove</button></div><div class="muted">${g?g.effect:''}</div></div>`}).join('')||'<p class="muted">No gear added yet. Use the Armory tab.</p>'}</div>`}
function Reference(){return `<div class="grid g2">${panel('Core Check',`<div class="notice"><b>Roll 3d6 ≤ Attribute + up to 2 Skills − Setbacks</b></div><p>Setbacks represent darkness, fear, injury, bad footing, interference, curses, missing components, or bad positioning. Players may offset pressure with up to two relevant skills when the fiction supports it.</p>`)}${panel('Round Flow',`<ol><li>Intent: say what you do, how, and which Attribute applies.</li><li>Roll only when outcome is uncertain and failure matters.</li><li>Reaction: Dodge, Brace, or Counter once.</li><li>Damage / effect resolution.</li><li>Update injuries, afflictions, hazards, escalation.</li></ol>`)}${panel('Movement',`<p><b>Move:</b> about 20 ft / 6 m, or 4 squares on a 5-foot grid. Prowess 10+ may add +1 square; heavy armor or severe injury can reduce movement. Sprinting costs more action economy but doubles distance.</p>`)}${panel('Investigation',`<p><b>Ask 3:</b> Method? Approach? Attribute?</p><p><b>Field:</b> Instinct. <b>Research:</b> Intellect. <b>Social:</b> Charisma. <b>Technical:</b> Tinkering/Intellect.</p><p><b>Full success:</b> remove 2 possibilities, precise clue, +1 forward. <b>Partial:</b> remove 1 possibility. <b>Failure:</b> false lead, danger, time loss, suspicion, escalation.</p>`)}${panel('Factions',DATA.factions.map(f=>`<div class="skillcard"><h3>${f.name}</h3><p><b>${f.type}</b> — ${f.bonus}</p><p class="muted">Drawback: ${f.drawback}</p></div>`).join(''))}</div>`}
function downloadCharacter(){let blob=new Blob([JSON.stringify(C,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(C.identity.name||'night-warden-character').replace(/[^a-z0-9]+/gi,'_')+'.json';a.click()}function loadCharacterFile(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{C=Object.assign(blank(),JSON.parse(r.result));save();render()}catch(err){alert('Could not load JSON.')}};r.readAsText(f)}function downloadAllData(){let blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='night_wardens_data.json';a.click()}
</script></body></html>
