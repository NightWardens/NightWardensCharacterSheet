<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2a1512" />
  <title>Night Wardens Beyond Lite</title>
  <style>
    :root{--ink:#241f1b;--blood:#4b0d0d;--blood2:#7d1717;--paper:#efe8dc;--paper2:#f8f2e8;--line:#9d9385;--muted:#6d6258;--dark:#2c2723;--good:#1f6b3a;--warn:#a16000;--bad:#8d1b1b;--shadow:0 18px 45px rgba(26,18,12,.18)}
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
    body:before{content:"";position:fixed;inset:0;z-index:-2;background:
      radial-gradient(circle at 18% 9%, rgba(95,78,62,.11) 0 5%, transparent 5.3%),
      radial-gradient(circle at 70% 18%, rgba(125,65,50,.09) 0 7%, transparent 7.3%),
      radial-gradient(circle at 82% 88%, rgba(80,70,60,.08) 0 6%, transparent 6.3%),
      radial-gradient(circle at 35% 78%, rgba(125,65,50,.08) 0 4%, transparent 4.3%),
      linear-gradient(90deg, transparent 3%, rgba(50,45,40,.12) 3.12%, transparent 3.3%, transparent 96.7%, rgba(50,45,40,.12) 96.9%, transparent 97.1%),
      linear-gradient(0deg, transparent 3%, rgba(50,45,40,.12) 3.12%, transparent 3.3%, transparent 96.7%, rgba(50,45,40,.12) 96.9%, transparent 97.1%);}
    body:after{content:"✦";position:fixed;left:50%;top:48px;transform:translateX(-50%);font-size:210px;color:rgba(70,64,58,.06);z-index:-1;line-height:1}
    button,input,select,textarea{font:inherit} button{cursor:pointer}.hidden{display:none!important}
    .wrap{max-width:1280px;margin:auto;padding:18px}.hero{border:1px solid rgba(89,74,60,.35);background:rgba(248,242,232,.86);box-shadow:var(--shadow);border-radius:24px;padding:22px;text-align:center;backdrop-filter:blur(8px)}
    .kicker{font-size:12px;letter-spacing:.35em;text-transform:uppercase;font-weight:900;color:rgba(75,13,13,.85)} h1{margin:2px 0 0;font-size:clamp(34px,5vw,64px);line-height:.95;text-transform:uppercase;letter-spacing:.04em} .sub{margin:.45rem 0 0;color:var(--muted);font-style:italic}
    .topbar{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.profile{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.avatar,.portrait{border-radius:18px;border:1px solid var(--line);background:#fff9;width:58px;height:58px;object-fit:cover;display:grid;place-items:center;font-weight:900;color:var(--blood)}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{background:#342d28;color:#fff;border:0;border-radius:14px;padding:10px 13px;font-weight:800}.tab.active{background:var(--blood2)}
    .grid{display:grid;gap:14px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.mainGrid{grid-template-columns:1.05fr .95fr}.campaignGrid{grid-template-columns:340px 1fr}@media(max-width:900px){.cols2,.cols3,.cols4,.mainGrid,.campaignGrid{grid-template-columns:1fr}.wrap{padding:10px}.hero{padding:16px}}
    .card{border:1px solid rgba(89,74,60,.45);background:rgba(248,242,232,.91);box-shadow:0 12px 30px rgba(26,18,12,.12);border-radius:20px;padding:14px;backdrop-filter:blur(6px)}
    .card h2{margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(89,74,60,.35);font-size:18px;text-transform:uppercase;letter-spacing:.08em}.card h3{margin:0 0 8px;color:var(--blood);font-size:18px}.small{font-size:12px;color:var(--muted)} .note{background:rgba(75,13,13,.08);border:1px solid rgba(75,13,13,.22);padding:10px;border-radius:14px}.darknote{background:#2d2723;color:#fff;border-radius:14px;padding:12px}.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:rgba(75,13,13,.12);border:1px solid rgba(75,13,13,.2);font-size:12px;font-weight:800}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spread{justify-content:space-between}.field label,.fieldLabel{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:#554a42;margin-bottom:4px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:9px 10px;background:rgba(255,255,255,.68);color:var(--ink)} textarea{min-height:90px;resize:vertical}.btn{border:0;border-radius:13px;padding:10px 13px;font-weight:900;background:var(--blood);color:white}.btn.secondary{background:#3b342f}.btn.ghost{background:rgba(255,255,255,.65);color:var(--ink);border:1px solid var(--line)}.btn.good{background:var(--good)}.btn.warn{background:var(--warn)}.btn.bad{background:var(--bad)}.btn:disabled{opacity:.45;cursor:not-allowed}
    .landing{min-height:calc(100vh - 36px);display:grid;place-items:center}.landingBox{max-width:980px;width:100%}.loginGrid{grid-template-columns:1fr 1fr}@media(max-width:800px){.loginGrid{grid-template-columns:1fr}}
    .list{display:grid;gap:8px}.item{border:1px solid rgba(89,74,60,.38);background:rgba(255,255,255,.55);border-radius:14px;padding:10px}.item.active{outline:2px solid var(--blood2)}.rank{display:flex;gap:4px}.box{height:20px;width:20px;border:1px solid var(--line);border-radius:4px;background:#fff}.box.on{background:var(--blood);border-color:var(--blood);box-shadow:inset 0 0 0 3px rgba(255,255,255,.3)}
    .stepper{display:flex;gap:8px;flex-wrap:wrap}.step{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:#fff8;font-size:12px;font-weight:900}.step.active{background:var(--blood);color:#fff;border-color:var(--blood)}.library{max-height:620px;overflow:auto;padding-right:4px}.chatBox{height:440px;overflow:auto;background:rgba(255,255,255,.45);border:1px solid var(--line);border-radius:16px;padding:10px}.msg{border-radius:14px;background:#fff9;margin:8px 0;padding:9px;border:1px solid rgba(89,74,60,.25)}.msg .meta{font-size:11px;color:var(--muted);font-weight:900}.menuCard{transition:.15s transform}.menuCard:hover{transform:translateY(-2px)}.dangerText{color:var(--bad);font-weight:900}.successText{color:var(--good);font-weight:900}.inlineRoll{font-family:ui-monospace,Menlo,Consolas,monospace;background:#fff8;border:1px solid var(--line);padding:3px 7px;border-radius:8px}.printOnly{display:none}@media print{.nav,.topbar,.noPrint,.landing{display:none!important}.tabPanel{display:block!important}.wrap{padding:0}.card{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const FALLBACK_DATA = null;
const LS = {
  account:'nw_account_v3', activeAccount:'nw_active_account_v3', characters:'nw_characters_v3', campaigns:'nw_campaigns_v3'
};
const $ = s => document.querySelector(s); const $$ = s => [...document.querySelectorAll(s)];
let DATA=null;
let state={tab:'dashboard', account:null, characters:[], campaigns:[], activeCharacterId:null, activeCampaignId:null, wizardStep:0, query:'', roller:{dice:'3d6',attr:'instinct',primary:'Awareness',support1:'none',support2:'none',setbacks:0}, rolls:[]};
const STEPS=['Identity','Lore','Appearance','Role','Attributes','Skills','Equipment','Finish'];
function uid(prefix='id'){return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function save(k,v){localStorage.setItem(k, JSON.stringify(v))} function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function clamp(n,min,max){n=Number(n)||0;return Math.max(min,Math.min(max,n))}
function baseAttributes(){return {...DATA.baseAttributes}}
function rolePackage(roleName){const attrs=baseAttributes(); const role=DATA.roles[roleName]||DATA.roles.Tracker; Object.entries(role.bonuses).forEach(([k,v])=>attrs[k]=(attrs[k]||9)+v); return attrs}
function allRoleSkills(roleName){const r=DATA.roles[roleName]||DATA.roles.Tracker;return [...r.starter,...r.experienced,...r.master]}
function rank(ch,skill){return clamp(ch?.skills?.[skill]||0,0,3)}
function allSkills(){const set=new Set();Object.values(DATA.roles).forEach(r=>[...r.starter,...r.experienced,...r.master].forEach(s=>set.add(s)));DATA.sharedSkills.forEach(s=>set.add(s.name));DATA.spells.forEach(s=>set.add(s.name));return [...set].sort()}
function activeChar(){return state.characters.find(c=>c.id===state.activeCharacterId)||null} function activeCamp(){return state.campaigns.find(c=>c.id===state.activeCampaignId)||null}
function persist(){save(LS.activeAccount,state.account);save(LS.characters,state.characters);save(LS.campaigns,state.campaigns)}
function defaultCharacter(){return {id:uid('char'),created:new Date().toISOString(),updated:new Date().toISOString(),profile:{name:'',lineage:'',age:'',role:'Tracker',height:'',weight:'',pronouns:'',backgroundAlias:'',image:''},lore:{concept:'',backstory:'',scar:'',fear:'',goals:'',contacts:''},appearance:{eyes:'',hair:'',build:'',style:'',notes:''},attributes:rolePackage('Tracker'),manualAttributeEdits:false,subfocus:{},skills:{},health:{healthy:4,wounded:0,critical:0,downed:false},marks:0,tier:1,equipment:[],notes:'',afflictions:'',startingPackage:''}}
function newCampaign(){return {id:uid('camp'),name:'New Campaign',joinCode:Math.random().toString(36).slice(2,8).toUpperCase(),gm:state.account?.displayName||'GM',summary:'',players:[],characters:[],chats:[{id:uid('chat'),name:'Table Chat',visibleTo:'all',messages:[]}],created:new Date().toISOString(),updated:new Date().toISOString()}}
async function init(){try{const res=await fetch('night_wardens_data.json',{cache:'no-store'});DATA=await res.json()}catch(e){document.body.insertAdjacentHTML('afterbegin','<div style="background:#8d1b1b;color:white;padding:8px;text-align:center">Could not load night_wardens_data.json. Check that it is uploaded next to index.html.</div>');DATA=FALLBACK_DATA}state.account=load(LS.activeAccount,null);state.characters=load(LS.characters,[]);state.campaigns=load(LS.campaigns,[]);render()}
function render(){if(!state.account)return renderLanding(); renderShell()}
function renderLanding(){document.getElementById('app').innerHTML=`<div class="wrap landing"><div class="landingBox"><div class="hero"><div class="kicker">Night Wardens digital field office</div><h1>Beyond Lite</h1><p class="sub">Local-first character sheets, campaigns, dice, and field notes.</p></div><div class="grid loginGrid" style="margin-top:14px"><div class="card"><h2>Login</h2><p class="small">This prototype uses device cache. Google sign-in needs Firebase/Supabase backend later.</p><div class="field"><label>Display Name</label><input id="loginName" placeholder="Anthony / Warden name"></div><div class="field" style="margin-top:8px"><label>Email or Handle</label><input id="loginEmail" placeholder="optional"></div><button class="btn" style="margin-top:12px;width:100%" onclick="loginLocal()">Login / Create Local Account</button></div><div class="card"><h2>Future Account Options</h2><div class="list"><div class="item"><b>Local Cache</b><br><span class="small">Works now. Stores characters/campaigns on this device.</span></div><div class="item"><b>Google Sign-In</b><br><span class="small">Requires Firebase Auth or Supabase Auth, plus database rules for private campaign chat.</span></div><div class="item"><b>Portable Files</b><br><span class="small">Export/import JSON to move characters between devices.</span></div></div></div></div></div></div>`}
function loginLocal(){const name=$('#loginName').value.trim()||'Local Warden';const email=$('#loginEmail').value.trim();state.account={id:'local_'+(email||name).toLowerCase().replace(/\W+/g,'_'),displayName:name,email,mode:'local-cache'};persist();render()}
function logout(){state.account=null;save(LS.activeAccount,null);render()}
function renderShell(){document.getElementById('app').innerHTML=`<div class="wrap"><header class="hero"><div class="kicker">Night Wardens</div><h1>Field Office</h1><p class="sub">D&D Beyond Lite for your supernatural investigation RPG.</p><div class="topbar"><div class="profile"><div class="avatar">${esc((state.account.displayName||'W')[0])}</div><div><b>${esc(state.account.displayName)}</b><br><span class="small">${state.account.mode==='local-cache'?'Local cache account':'Online account'}</span></div></div><div class="row"><button class="btn ghost" onclick="exportAll()">Export Vault</button><label class="btn ghost noPrint">Import Vault<input type="file" accept="application/json" style="display:none" onchange="importAll(event)"></label><button class="btn secondary" onclick="logout()">Logout</button></div></div></header>${nav()}<div id="panel"></div></div>`;renderPanel()}
function nav(){const tabs=[['dashboard','Dashboard'],['create','Character Creator'],['sheet','Character Sheet'],['level','Level Up'],['campaigns','Campaign Manager'],['library','Library'],['roller','Dice'],['reference','Reference']];return `<nav class="nav">${tabs.map(([id,l])=>`<button class="tab ${state.tab===id?'active':''}" onclick="state.tab='${id}';renderPanel()">${l}</button>`).join('')}</nav>`}
function renderPanel(){const map={dashboard,create,sheet,level,campaigns,library,roller,reference};$('#panel').innerHTML=(map[state.tab]||dashboard)(); afterRender()}
function afterRender(){if(state.tab==='create') highlightStep();}
function dashboard(){const ch=activeChar();return `<div class="grid cols3"><div class="card menuCard"><h2>Load Character</h2><p class="small">Continue an existing Warden.</p>${characterPicker()}<button class="btn" style="margin-top:10px;width:100%" onclick="state.tab='sheet';renderShell()" ${!ch?'disabled':''}>Open Sheet</button></div><div class="card menuCard"><h2>New Character</h2><p class="small">Guided creation: lore, appearance, role, attributes, skills, and starting gear.</p><button class="btn" onclick="createCharacterStart()" style="width:100%">Start Guided Creator</button></div><div class="card menuCard"><h2>Join Campaign</h2><p class="small">Local prototype: join by code on this device, or create your own campaign.</p><div class="field"><label>Join Code</label><input id="joinCode" placeholder="ABC123"></div><button class="btn secondary" style="margin-top:10px;width:100%" onclick="joinByCode()">Join / Open Campaign</button><button class="btn ghost" style="margin-top:8px;width:100%" onclick="createCampaign()">Create Campaign</button></div></div><div class="grid cols2" style="margin-top:14px"><div class="card"><h2>Characters</h2><div class="list">${state.characters.map(c=>characterRow(c)).join('')||'<div class="item small">No characters yet.</div>'}</div></div><div class="card"><h2>Campaigns</h2><div class="list">${state.campaigns.map(c=>campaignRow(c)).join('')||'<div class="item small">No campaigns yet.</div>'}</div></div></div>`}
function characterPicker(){return `<select onchange="state.activeCharacterId=this.value;persist();renderPanel()"><option value="">Select character...</option>${state.characters.map(c=>`<option ${state.activeCharacterId===c.id?'selected':''} value="${c.id}">${esc(c.profile.name||'Unnamed Warden')} — ${esc(c.profile.role)}</option>`).join('')}</select>`}
function characterRow(c){return `<div class="item ${state.activeCharacterId===c.id?'active':''}"><div class="row spread"><div><b>${esc(c.profile.name||'Unnamed Warden')}</b><br><span class="small">${esc(c.profile.role)} | Tier ${c.tier||1} | ${c.marks||0} marks</span></div><div class="row"><button class="btn ghost" onclick="state.activeCharacterId='${c.id}';state.tab='sheet';persist();renderShell()">Open</button><button class="btn ghost" onclick="downloadCharacter('${c.id}')">JSON</button></div></div></div>`}
function campaignRow(c){return `<div class="item ${state.activeCampaignId===c.id?'active':''}"><div class="row spread"><div><b>${esc(c.name)}</b><br><span class="small">Code ${c.joinCode} | ${c.players.length} players | ${c.chats.length} chats</span></div><button class="btn ghost" onclick="state.activeCampaignId='${c.id}';state.tab='campaigns';persist();renderShell()">Open</button></div></div>`}
function createCharacterStart(){const ch=defaultCharacter();state.characters.push(ch);state.activeCharacterId=ch.id;state.wizardStep=0;persist();state.tab='create';renderShell()}
function createCampaign(){const c=newCampaign();state.campaigns.push(c);state.activeCampaignId=c.id;persist();state.tab='campaigns';renderShell()}
function joinByCode(){const code=($('#joinCode')?.value||'').trim().toUpperCase();let c=state.campaigns.find(x=>x.joinCode===code);if(!c){c=newCampaign();c.name='Joined Campaign '+code;c.joinCode=code;c.players.push({name:state.account.displayName,email:state.account.email||'',id:state.account.id});state.campaigns.push(c)}state.activeCampaignId=c.id;persist();state.tab='campaigns';renderShell()}
function create(){let ch=activeChar();if(!ch)return `<div class="card"><h2>No Character</h2><button class="btn" onclick="createCharacterStart()">Create One</button></div>`;return `<div class="card"><h2>Guided Character Creation</h2><div class="stepper">${STEPS.map((s,i)=>`<button class="step ${state.wizardStep===i?'active':''}" onclick="state.wizardStep=${i};renderPanel()">${i+1}. ${s}</button>`).join('')}</div></div><div class="grid mainGrid" style="margin-top:14px"><div class="card" id="wizardMain">${wizardStep(ch)}</div><div class="card"><h2>Character Preview</h2>${portraitHtml(ch)}<div class="note"><b>${esc(ch.profile.name||'Unnamed Warden')}</b><br>${esc(ch.profile.role)} — ${DATA.roles[ch.profile.role]?.function||''}</div><div style="margin-top:10px">${attributeTable(ch)}</div><h3 style="margin-top:12px">Skills</h3><div class="small">${Object.entries(ch.skills).filter(([,v])=>v>0).map(([k,v])=>`${esc(k)} r${v}`).join(', ')||'No ranked skills yet.'}</div></div></div>`}
function wizardStep(ch){const i=state.wizardStep; if(i===0)return identityStep(ch); if(i===1)return loreStep(ch); if(i===2)return appearanceStep(ch); if(i===3)return roleStep(ch); if(i===4)return attributesStep(ch); if(i===5)return skillsStep(ch); if(i===6)return equipmentStep(ch); return finishStep(ch)}
function navWizard(){return `<div class="row spread" style="margin-top:14px"><button class="btn ghost" onclick="state.wizardStep=Math.max(0,state.wizardStep-1);renderPanel()">Back</button><button class="btn" onclick="state.wizardStep=Math.min(${STEPS.length-1},state.wizardStep+1);renderPanel()">Next</button></div>`}
function setChar(path,value){const ch=activeChar();let o=ch;const parts=path.split('.');for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts.at(-1)]=value;ch.updated=new Date().toISOString();persist();}
function field(path,label,val,type='text'){return `<div class="field"><label>${label}</label><input type="${type}" value="${esc(val??'')}" onchange="setChar('${path}',this.value);renderPanel()"></div>`}
function text(path,label,val){return `<div class="field"><label>${label}</label><textarea onchange="setChar('${path}',this.value);renderPanel()">${esc(val??'')}</textarea></div>`}
function identityStep(ch){return `<h2>1. Identity</h2><div class="grid cols2">${field('profile.name','Name',ch.profile.name)}${field('profile.lineage','Lineage',ch.profile.lineage)}${field('profile.age','Age',ch.profile.age)}${field('profile.pronouns','Pronouns / Notes',ch.profile.pronouns)}${field('profile.height','Height',ch.profile.height)}${field('profile.weight','Weight',ch.profile.weight)}${field('profile.backgroundAlias','Background / Alias',ch.profile.backgroundAlias)}</div>${navWizard()}`}
function loreStep(ch){return `<h2>2. Lore & Backstory</h2><div class="grid cols2">${text('lore.concept','One-sentence concept',ch.lore.concept)}${text('lore.scar','The scar that taught them the world was wrong',ch.lore.scar)}${text('lore.backstory','Backstory',ch.lore.backstory)}${text('lore.fear','What they fear becoming',ch.lore.fear)}${text('lore.goals','Goals / motivations',ch.lore.goals)}${text('lore.contacts','Contacts / relationships',ch.lore.contacts)}</div>${navWizard()}`}
function appearanceStep(ch){return `<h2>3. Appearance</h2><div class="row"><label class="btn ghost">Upload Character Image<input type="file" accept="image/*" style="display:none" onchange="uploadPortrait(event)"></label><button class="btn ghost" onclick="clearPortrait()">Clear Image</button></div><div class="grid cols2" style="margin-top:12px">${field('appearance.eyes','Eyes',ch.appearance.eyes)}${field('appearance.hair','Hair',ch.appearance.hair)}${field('appearance.build','Build',ch.appearance.build)}${field('appearance.style','Clothing / style',ch.appearance.style)}${text('appearance.notes','Appearance notes',ch.appearance.notes)}</div>${navWizard()}`}
function portraitHtml(ch){return `<div class="row" style="margin-bottom:10px">${ch.profile.image?`<img class="portrait" src="${ch.profile.image}" alt="portrait">`:`<div class="portrait">${esc((ch.profile.name||'W')[0])}</div>`}<div><b>Portrait</b><br><span class="small">Saved inside exported character JSON.</span></div></div>`}
function uploadPortrait(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{setChar('profile.image',r.result);renderPanel()};r.readAsDataURL(f)} function clearPortrait(){setChar('profile.image','');renderPanel()}
function roleStep(ch){return `<h2>4. Choose Role</h2><p class="small">Roles are your version of classes: hunting style, not destiny lock.</p><div class="grid cols2">${Object.entries(DATA.roles).map(([name,r])=>`<div class="item ${ch.profile.role===name?'active':''}"><div class="row spread"><div><b>${name}</b><br><span class="small">${r.function}</span></div><button class="btn ${ch.profile.role===name?'secondary':''}" onclick="chooseRole('${name}')">${ch.profile.role===name?'Selected':'Choose'}</button></div><div class="small" style="margin-top:8px">Bonuses: ${Object.entries(r.bonuses).map(([k,v])=>`${attrLabel(k)} +${v}`).join(', ')}</div><div class="small">Starter: ${r.starter.join(', ')}</div></div>`).join('')}</div>${navWizard()}`}
function chooseRole(name){const ch=activeChar();ch.profile.role=name;ch.attributes=rolePackage(name);ch.manualAttributeEdits=false;ch.skills={};DATA.roles[name].starter.forEach(s=>ch.skills[s]=1);persist();renderPanel()}
function attrLabel(k){return DATA.attributes.find(a=>a.key===k)?.label||k}
function attributeTable(ch){return `<div class="list">${DATA.attributes.map(a=>`<div class="item"><div class="row spread"><div><b>${a.label}</b><br><span class="small">${a.use}</span></div><span class="pill">${ch.attributes[a.key]}</span></div></div>`).join('')}</div>`}
function attributesStep(ch){return `<h2>5. Attributes</h2><p class="small">This fixes the reassignment issue: role attributes are recalculated from base 9 + role bonus. Manual edits are tracked separately.</p><div class="row"><button class="btn" onclick="recalcAttrs()">Recalculate from Role</button><span class="pill">Manual edits: ${ch.manualAttributeEdits?'Yes':'No'}</span></div><div class="grid cols2" style="margin-top:12px">${DATA.attributes.map(a=>`<div class="item"><div class="field"><label>${a.label}</label><input type="number" value="${ch.attributes[a.key]}" onchange="editAttr('${a.key}',this.value)"></div><div class="small">${a.use}</div></div>`).join('')}</div>${navWizard()}`}
function recalcAttrs(){const ch=activeChar();ch.attributes=rolePackage(ch.profile.role);ch.manualAttributeEdits=false;persist();renderPanel()} function editAttr(k,v){const ch=activeChar();ch.attributes[k]=clamp(v,0,30);ch.manualAttributeEdits=true;persist();}
function skillsStep(ch){const role=DATA.roles[ch.profile.role];return `<h2>6. Starting Skills</h2><p class="small">Starter skills are applied at Rank 1. Experienced/Master skills unlock through leveling.</p><h3>Starter Package</h3><div class="grid cols2">${role.starter.map(s=>skillCard(ch,s,'Starter')).join('')}</div><h3 style="margin-top:12px">Locked Role Track</h3><div class="grid cols2">${[...role.experienced.map(s=>skillCard(ch,s,'Experienced')), ...role.master.map(s=>skillCard(ch,s,'Master'))].join('')}</div>${navWizard()}`}
function skillCard(ch,s,tier){return `<div class="item"><div class="row spread"><div><b>${esc(s)}</b><br><span class="small">${tier}</span></div>${rankBoxesHtml(ch.id,s)}</div></div>`}
function rankBoxesHtml(charId,skill){const ch=state.characters.find(c=>c.id===charId);const r=rank(ch,skill);return `<div class="rank">${[1,2,3].map(n=>`<button class="box ${r>=n?'on':''}" title="rank ${n}" onclick="setSkillRank('${charId}','${esc(skill).replace(/'/g,'&#39;')}',${r===n?n-1:n});renderPanel()"></button>`).join('')}</div>`}
function setSkillRank(charId,skill,value){const ch=state.characters.find(c=>c.id===charId); if(!ch)return; ch.skills[skill]=clamp(value,0,3); ch.updated=new Date().toISOString(); persist()}
function equipmentStep(ch){return `<h2>7. Starting Equipment</h2><p class="small">Pick a package, then add individual items from the armory.</p><div class="grid cols2">${Object.entries(DATA.starterEquipmentPackages).map(([name,items])=>`<div class="item ${ch.startingPackage===name?'active':''}"><b>${name}</b><div class="small">${items.join(', ')}</div><button class="btn ghost" style="margin-top:8px" onclick="applyEquipment('${name}')">Apply Package</button></div>`).join('')}</div><h3 style="margin-top:12px">Current Equipment</h3><div class="list">${ch.equipment.map((it,i)=>`<div class="item row spread"><span>${esc(it)}</span><button class="btn ghost" onclick="removeEquip(${i})">Remove</button></div>`).join('')||'<div class="item small">No equipment selected.</div>'}</div>${navWizard()}`}
function applyEquipment(name){const ch=activeChar();ch.startingPackage=name;ch.equipment=[...new Set([...(ch.equipment||[]),...DATA.starterEquipmentPackages[name]])];persist();renderPanel()} function removeEquip(i){const ch=activeChar();ch.equipment.splice(i,1);persist();renderPanel()}
function finishStep(ch){return `<h2>8. Finish</h2><div class="note"><b>${esc(ch.profile.name||'Unnamed Warden')}</b> is ready for the field as a ${esc(ch.profile.role)}.</div><div class="row" style="margin-top:12px"><button class="btn good" onclick="state.tab='sheet';renderShell()">Open Character Sheet</button><button class="btn ghost" onclick="downloadCharacter('${ch.id}')">Download Character JSON</button></div>${navWizard()}`}
function highlightStep(){}
function sheet(){const ch=activeChar();if(!ch)return `<div class="card"><h2>No Character Loaded</h2>${characterPicker()}<button class="btn" style="margin-top:10px" onclick="createCharacterStart()">Create Character</button></div>`;return `<div class="grid mainGrid"><div class="card"><h2>Warden Dossier</h2>${portraitHtml(ch)}<div class="grid cols2">${field('profile.name','Name',ch.profile.name)}${field('profile.role','Role',ch.profile.role)}${field('profile.lineage','Lineage',ch.profile.lineage)}${field('profile.backgroundAlias','Background / Alias',ch.profile.backgroundAlias)}</div><h3 style="margin-top:12px">Attributes</h3><div class="grid cols2">${DATA.attributes.map(a=>`<div class="item"><div class="row spread"><div><b>${a.label}</b><br><span class="small">${a.use}</span></div><input style="width:78px" type="number" value="${ch.attributes[a.key]}" onchange="editAttr('${a.key}',this.value);renderPanel()"></div></div>`).join('')}</div><h3 style="margin-top:12px">Health / Marks</h3><div class="grid cols4">${healthField('healthy','Healthy',ch)}${healthField('wounded','Wounded',ch)}${healthField('critical','Critical',ch)}<div class="field"><label>Warden Marks</label><input type="number" value="${ch.marks}" onchange="setChar('marks',clamp(this.value,0,99));renderPanel()"></div></div>${text('afflictions','Afflictions / Corruption / Vessel Strain',ch.afflictions)}${text('notes','Notes',ch.notes)}</div><div class="card"><h2>Skills & Gear</h2><div class="list">${Object.keys(ch.skills).sort().map(s=>skillCard(ch,s,'Known')).join('')||'<div class="item small">No skills ranked.</div>'}</div><h3 style="margin-top:12px">Equipment</h3><div class="list">${ch.equipment.map(x=>`<div class="item">${esc(x)}</div>`).join('')||'<div class="item small">No equipment.</div>'}</div><div class="row" style="margin-top:12px"><button class="btn ghost" onclick="downloadCharacter('${ch.id}')">Download JSON</button><label class="btn ghost">Load JSON<input type="file" accept="application/json" style="display:none" onchange="importCharacter(event)"></label><button class="btn bad" onclick="deleteCharacter('${ch.id}')">Delete</button></div></div></div>`}
function healthField(k,l,ch){return `<div class="field"><label>${l}</label><input type="number" value="${ch.health[k]}" onchange="setChar('health.${k}',clamp(this.value,0,9));renderPanel()"></div>`}
function level(){const ch=activeChar();if(!ch)return `<div class="card"><h2>No Character Loaded</h2>${characterPicker()}</div>`;const role=DATA.roles[ch.profile.role];const canShared=(ch.tier||1)>=2;return `<div class="grid campaignGrid"><div class="card"><h2>Guided Leveling</h2><div class="note"><b>Warden Marks:</b> ${ch.marks||0}<br><b>Role Tier:</b> ${ch.tier||1}<br><span class="small">Role skills are prioritized before shared/off-role skills. Shared skills unlock at Tier 2 in this prototype.</span></div><div class="list" style="margin-top:10px"><button class="btn" onclick="spendTier()">Unlock Next Role Tier — 3 marks</button><button class="btn secondary" onclick="spendAttrPrompt()">Increase Attribute — 4/6 marks</button><button class="btn ghost" onclick="addMarks(1)">+1 Mark</button><button class="btn ghost" onclick="addMarks(2)">+2 Marks</button><button class="btn ghost" onclick="addMarks(3)">+3 Marks</button></div></div><div class="card"><h2>Available Role Skills</h2><h3>Starter</h3><div class="grid cols2">${role.starter.map(s=>levelSkill(ch,s,1)).join('')}</div><h3>Experienced ${ch.tier>=2?'':'(Locked)'}</h3><div class="grid cols2">${role.experienced.map(s=>levelSkill(ch,s,2)).join('')}</div><h3>Master ${ch.tier>=3?'':'(Locked)'}</h3><div class="grid cols2">${role.master.map(s=>levelSkill(ch,s,3)).join('')}</div><h2 style="margin-top:14px">Shared Skills ${canShared?'':'(Locked until Tier 2)'}</h2><div class="grid cols2">${DATA.sharedSkills.map(s=>levelSkill(ch,s.name,2,!canShared,s.use)).join('')}</div></div></div>`}
function levelSkill(ch,s,reqTier,locked=false,use=''){const r=rank(ch,s);const can=(ch.tier||1)>=reqTier&&!locked;return `<div class="item"><div class="row spread"><div><b>${esc(s)}</b><br><span class="small">${use||'Role skill'} | Rank ${r}</span></div>${rankBoxesHtml(ch.id,s)}</div><button class="btn ghost" style="margin-top:8px" ${(!can||ch.marks<1||r>=3)?'disabled':''} onclick="spendSkill('${s.replace(/'/g,"\\'")}')">Spend 1 Mark</button></div>`}
function addMarks(n){const ch=activeChar();ch.marks=clamp((ch.marks||0)+n,0,99);persist();renderPanel()} function spendSkill(s){const ch=activeChar();if(ch.marks<1||rank(ch,s)>=3)return;ch.marks--;ch.skills[s]=rank(ch,s)+1;persist();renderPanel()} function spendTier(){const ch=activeChar();if(ch.marks<3||ch.tier>=3)return alert('Need 3 marks or already master tier.');ch.marks-=3;ch.tier++;persist();renderPanel()} function spendAttrPrompt(){const ch=activeChar();const a=prompt('Attribute key to increase: force, prowess, intellect, instinct, will, charisma, endurance');if(!a||!(a in ch.attributes))return;const cost=ch.attributes[a]>=12?6:4;if(ch.marks<cost)return alert('Need '+cost+' marks.');ch.marks-=cost;ch.attributes[a]++;ch.manualAttributeEdits=true;persist();renderPanel()}
function campaigns(){let c=activeCamp();return `<div class="grid campaignGrid"><div class="card"><h2>Campaigns</h2><button class="btn" onclick="createCampaign()" style="width:100%;margin-bottom:10px">Create Campaign</button><div class="list">${state.campaigns.map(campaignRow).join('')||'<div class="item small">No campaigns.</div>'}</div></div><div class="card">${c?campaignDetail(c):'<h2>No Campaign Selected</h2><p class="small">Create or open a campaign.</p>'}</div></div>`}
function campaignDetail(c){return `<h2>${esc(c.name)}</h2><div class="grid cols2"><div class="field"><label>Campaign Name</label><input value="${esc(c.name)}" onchange="editCampaign('name',this.value)"></div><div class="field"><label>Join Code</label><input value="${esc(c.joinCode)}" onchange="editCampaign('joinCode',this.value.toUpperCase())"></div></div><div class="field" style="margin-top:8px"><label>Summary</label><textarea onchange="editCampaign('summary',this.value)">${esc(c.summary)}</textarea></div><h3>Players</h3><div class="row"><input id="playerName" placeholder="Player name"><input id="playerEmail" placeholder="email/handle"><button class="btn ghost" onclick="addPlayer()">Add Player</button></div><div class="list" style="margin-top:8px">${c.players.map((p,i)=>`<div class="item row spread"><span>${esc(p.name)} <span class="small">${esc(p.email||'')}</span></span><button class="btn ghost" onclick="removePlayer(${i})">Remove</button></div>`).join('')||'<div class="item small">No players yet.</div>'}</div><h3>Campaign Chats</h3><div class="row"><input id="chatName" placeholder="New chat name"><button class="btn ghost" onclick="addChat()">Add Chat</button></div>${chatArea(c)}`}
function editCampaign(k,v){const c=activeCamp();c[k]=v;c.updated=new Date().toISOString();persist()} function addPlayer(){const c=activeCamp();c.players.push({id:uid('player'),name:$('#playerName').value||'Player',email:$('#playerEmail').value||''});persist();renderPanel()} function removePlayer(i){activeCamp().players.splice(i,1);persist();renderPanel()} function addChat(){const c=activeCamp();c.chats.push({id:uid('chat'),name:$('#chatName').value||'New Chat',visibleTo:'all',messages:[]});persist();renderPanel()}
function chatArea(c){const chat=c.chats[0];return `<div class="note" style="margin-top:10px"><b>Privacy note:</b> In this local prototype, chats are only private on this device. Real player-only chat needs Firebase/Supabase or another backend with sign-in and database security rules.</div><div class="chatBox" style="margin-top:10px">${(chat?.messages||[]).map(m=>`<div class="msg"><div class="meta">${esc(m.author)} · ${new Date(m.time).toLocaleString()}</div>${esc(m.text)}</div>`).join('')||'<div class="small">No messages yet.</div>'}</div><div class="row" style="margin-top:8px"><input id="chatMsg" placeholder="Write campaign note/chat..."><button class="btn" onclick="sendChat('${chat?.id}')">Send</button></div>`}
function sendChat(id){const c=activeCamp();const chat=c.chats.find(x=>x.id===id);const txt=$('#chatMsg').value.trim();if(!txt)return;chat.messages.push({id:uid('msg'),author:state.account.displayName,time:new Date().toISOString(),text:txt});persist();renderPanel()}
function library(){const q=(state.query||'').toLowerCase();const cards=[];function add(kind,arr,map){arr.forEach(x=>{const obj=map(x);if(JSON.stringify(obj).toLowerCase().includes(q))cards.push(obj)})}add('Shared',DATA.sharedSkills,x=>({title:x.name,type:'Shared Skill',body:x.use,meta:x.attribute}));add('Gear',DATA.gear,x=>({title:x.name,type:x.type,body:x.effect,meta:'Gear'}));add('Relic',DATA.consumablesRelics,x=>({title:x.name,type:x.type,body:x.effect,meta:x.cost}));add('Spell',DATA.spells,x=>({title:x.name,type:x.kind,body:x.effect,meta:x.roll+' | '+x.cost}));add('Material',DATA.materials,x=>({title:x.name,type:x.category,body:x.function,meta:'Material'}));return `<div class="card"><h2>Complete Field Library</h2><input placeholder="Search skills, spells, gear, relics, materials..." value="${esc(state.query)}" oninput="state.query=this.value;renderPanel()"><div class="library grid cols3" style="margin-top:12px">${cards.map(c=>`<div class="item"><span class="pill">${esc(c.type)}</span><h3>${esc(c.title)}</h3><p class="small">${esc(c.meta)}</p><p>${esc(c.body)}</p>${activeChar()?`<button class="btn ghost" onclick="addToCharacter('${c.title.replace(/'/g,"\\'")}')">Add to Character</button>`:''}</div>`).join('')}</div></div>`}
function addToCharacter(name){const ch=activeChar();if(!ch)return;const isGear=[...DATA.gear,...DATA.consumablesRelics,...DATA.materials].some(x=>x.name===name);if(isGear){ch.equipment=[...new Set([...(ch.equipment||[]),name])]}else{ch.skills[name]=Math.max(rank(ch,name),1)}persist();renderPanel()}
function roller(){const ch=activeChar();const skills=allSkills();return `<div class="grid campaignGrid"><div class="card"><h2>Dice Roller</h2><div class="grid cols2"><div class="field"><label>Dice</label><select onchange="state.roller.dice=this.value"><option ${state.roller.dice==='3d6'?'selected':''}>3d6</option><option ${state.roller.dice==='2d6'?'selected':''}>2d6</option></select></div><div class="field"><label>Setbacks</label><input type="number" value="${state.roller.setbacks}" onchange="state.roller.setbacks=clamp(this.value,0,12)"></div></div><div class="field"><label>Attribute</label><select onchange="state.roller.attr=this.value">${DATA.attributes.map(a=>`<option value="${a.key}" ${state.roller.attr===a.key?'selected':''}>${a.label} ${ch?'('+ch.attributes[a.key]+')':''}</option>`).join('')}</select></div><div class="field"><label>Primary Skill</label><select onchange="state.roller.primary=this.value">${skills.map(s=>`<option ${state.roller.primary===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div><div class="grid cols2"><div class="field"><label>Support 1</label><select onchange="state.roller.support1=this.value"><option value="none">None</option>${skills.map(s=>`<option ${state.roller.support1===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div><div class="field"><label>Support 2</label><select onchange="state.roller.support2=this.value"><option value="none">None</option>${skills.map(s=>`<option ${state.roller.support2===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="rollCheck()">Roll Check</button></div><div class="card"><h2>Roll Log</h2><div class="list">${state.rolls.map(r=>`<div class="item"><div class="row spread"><b>${esc(r.label)}</b><span class="pill ${r.success?'successText':'dangerText'}">${r.success?'SUCCESS':'FAIL'}</span></div><div>Rolled <span class="inlineRoll">${r.dice.join(' + ')} = ${r.total}</span> vs Target <b>${r.target}</b></div><div class="small">${esc(r.detail)} · ${r.time}</div></div>`).join('')||'<div class="item small">No rolls yet.</div>'}</div></div></div>`}
function rollCheck(){const ch=activeChar();if(!ch)return alert('Load a character first.');const count=state.roller.dice==='2d6'?2:3;const dice=Array.from({length:count},()=>Math.floor(Math.random()*6)+1);const total=dice.reduce((a,b)=>a+b,0);const attr=ch.attributes[state.roller.attr]||0;const p=rank(ch,state.roller.primary);const s1=state.roller.support1==='none'?0:rank(ch,state.roller.support1);const s2=state.roller.support2==='none'?0:rank(ch,state.roller.support2);const supportOffset=Math.min(2,(s1>0?1:0)+(s2>0?1:0));const target=attr+p-Math.max(0,Number(state.roller.setbacks||0)-supportOffset);state.rolls.unshift({id:uid('roll'),label:`${attrLabel(state.roller.attr)} + ${state.roller.primary}`,dice,total,target,success:total<=target,detail:`Attr ${attr} + skill ${p} - setbacks ${state.roller.setbacks} + support offset ${supportOffset}`,time:new Date().toLocaleTimeString()});state.rolls=state.rolls.slice(0,20);renderPanel()}
function reference(){return `<div class="grid cols2"><div class="card"><h2>Core Check</h2><div class="darknote">Roll 3d6 ≤ Attribute + up to 2 Skills − Setbacks</div><p>Setbacks represent darkness, fear, injury, chaos, supernatural interference, bad position, or missing tools. Support skills can offset pressure when the fiction supports them.</p></div><div class="card"><h2>Landing / Account Roadmap</h2><div class="list"><div class="item"><b>Now:</b> local login/cache, export/import vault, character JSON.</div><div class="item"><b>Next:</b> Firebase Auth for Google sign-in.</div><div class="item"><b>Then:</b> Firestore campaigns/chats with per-player security rules.</div></div></div><div class="card"><h2>Round Flow</h2><ol><li>Intent: say what you do, how, and which attribute applies.</li><li>Roll only when uncertain and failure matters.</li><li>React: Dodge, Brace, or Counter once.</li><li>Damage/effect, then apply state.</li><li>Update injuries, afflictions, hazards, escalation.</li></ol></div><div class="card"><h2>Investigation</h2><p><b>Ask 3:</b> Method? Approach? Attribute?</p><p><b>Full:</b> remove 2 possibilities, precise clue, +1 forward. <b>Partial:</b> remove 1. <b>Failure:</b> false lead, danger, time loss, suspicion, escalation.</p></div></div>`}
function download(filename,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)} function downloadCharacter(id){const ch=state.characters.find(c=>c.id===id);download((ch.profile.name||'night_warden_character').replace(/\W+/g,'_')+'.json',JSON.stringify(ch,null,2))}
function importCharacter(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const ch=JSON.parse(r.result);ch.id=ch.id||uid('char');const i=state.characters.findIndex(c=>c.id===ch.id);if(i>=0)state.characters[i]=ch;else state.characters.push(ch);state.activeCharacterId=ch.id;persist();renderPanel()}catch{alert('Invalid character JSON')}};r.readAsText(f)}
function deleteCharacter(id){if(!confirm('Delete character from this device?'))return;state.characters=state.characters.filter(c=>c.id!==id);if(state.activeCharacterId===id)state.activeCharacterId=null;persist();renderShell()}
function exportAll(){download('night_wardens_vault.json',JSON.stringify({account:state.account,characters:state.characters,campaigns:state.campaigns},null,2))}
function importAll(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const v=JSON.parse(r.result);if(v.account)state.account=v.account;if(Array.isArray(v.characters))state.characters=v.characters;if(Array.isArray(v.campaigns))state.campaigns=v.campaigns;persist();renderShell()}catch{alert('Invalid vault JSON')}};r.readAsText(f)}
init();
</script>
</body>
</html>
