<!doctype html>
<html><head><meta charset="utf-8"><title>Night Wardens Pass 4 Demo</title>
<style>body{font-family:Georgia,serif;background:#efe8dc;color:#241f1b;padding:20px}button{padding:10px 14px;border:0;border-radius:10px;background:#4b0d0d;color:white;font-weight:bold}pre{background:#fff8;border:1px solid #9d9385;border-radius:12px;padding:12px;white-space:pre-wrap}</style></head>
<body>
<h1>Night Wardens Auto-GM Pass 4 Demo</h1>
<p>This demo loads the sample case and runs witness, research, and evidence actions through the investigation engine.</p>
<button id="run">Run Demo</button>
<pre id="out"></pre>
<script src="../src/auto_gm_witness_investigation_engine.js"></script>
<script>
async function main(){
  const caseState = await fetch('./sample_case_state_witnesses.json').then(r=>r.json());
  const actions = await fetch('./sample_parser_actions_pass4.json').then(r=>r.json());
  const rolls = await fetch('./sample_roll_results_pass4.json').then(r=>r.json());
  let state = caseState;
  const lines = [];
  for(let i=0;i<actions.length;i++){
    const res = NightWardensAutoGM.WitnessInvestigationEngine.resolveAction(state, actions[i], rolls[i]);
    state = res.caseState;
    lines.push("ACTION: " + JSON.stringify(actions[i]));
    lines.push("ROLL: " + JSON.stringify(rolls[i]));
    lines.push("PUBLIC: " + res.publicText);
    if(res.privateText) lines.push("PRIVATE: " + res.privateText);
    lines.push("");
  }
  lines.push("UPDATED INVESTIGATION:");
  lines.push(JSON.stringify(state.investigation,null,2));
  document.getElementById('out').textContent = lines.join("\n");
}
document.getElementById('run').onclick = main;
</script>
</body></html>
